<script>
const DATA = JSON.parse(document.getElementById('bootstrap-data').textContent);
const root = document.getElementById('root');

const PRODUCT_COLORS = {
  'RESTOCK':'#2563EB','PRODUCE':'#DB6E14','FULFILL':'#BA3636',
  'FORECAST/DBR':'#0891B2','PLATFORM':'#6B7280','DEV-TOOLS':'#7C3AED',
  'REPORTS':'#059669','MOBILE':'#0EA5E9','AVAILABILITY':'#10B981',
  'INVENTORY':'#F59E0B','OTHER':'#9CA3AF'
};
const TYPE_BADGES = {
  feat:'bg-emerald-100 text-emerald-800',
  fix:'bg-amber-100 text-amber-800',
  misc:'bg-slate-100 text-slate-700',
};

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})){
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()){
    if (c == null) continue;
    e.append(c.nodeType ? c : document.createTextNode(c));
  }
  return e;
}

function header(){
  const m = DATA.metrics;
  return el('header', {class:'sticky-top shadow-lg', style:'background:linear-gradient(135deg, #3F4948 0%, #2E3635 100%); color:white;'},
    el('div', {class:'max-w-7xl mx-auto px-6 py-6'},
      el('div', {class:'flex flex-wrap items-end justify-between gap-4'},
        el('div', {},
          el('div', {class:'sf-eyebrow', style:'color:#A1DBA6;'}, 'Silver Fern · Sprint Review'),
          el('h1', {class:'sf-h1 text-4xl mt-2', style:'color:white;'}, `Sprint ${m.sprint_label}`),
          el('div', {class:'sf-h2 text-lg mt-1', style:'color:#A1DBA6;'}, m.sprint_window)
        ),
        el('div', {class:'flex gap-6 text-right'},
          metric(m.merged, 'Merged'),
          metric(m.active, 'In Red'),
          metric(m.feat, 'Features'),
          metric(m.fix, 'Fixes'),
          metric(m.repos_touched, 'Repos'),
          metric(m.authors_count, 'Devs'),
        )
      ),
      el('nav', {class:'mt-6 flex flex-wrap gap-2 text-sm'},
        navlink('#overview','Overview'),
        navlink('#products','By Product'),
        navlink('#all','All PRs'),
        navlink('#active','In Red'),
        navlink('#metrics','Metrics'),
        navlink('#reviews','By Developer'),
      )
    )
  );
}
function metric(n, label){
  return el('div', {},
    el('div', {class:'text-3xl', style:'font-weight:700; color:white; line-height:1;'}, String(n)),
    el('div', {class:'sf-eyebrow mt-1', style:'color:rgba(161,219,166,0.85);'}, label)
  );
}
function navlink(href, label){
  return el('a',{href, class:'px-3 py-1.5 rounded transition', style:'background:rgba(161,219,166,0.15); color:white; border:1px solid rgba(161,219,166,0.25); font-weight:500;',
    onmouseover: (e) => { e.currentTarget.style.background = 'rgba(161,219,166,0.30)'; },
    onmouseout:  (e) => { e.currentTarget.style.background = 'rgba(161,219,166,0.15)'; },
  }, label);
}

function overviewSection(){
  return el('section', {id:'overview', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'sf-eyebrow mb-2'}, 'The Arc'),
    el('h2', {class:'sf-h2 text-3xl mb-3'}, 'Where we were → Where we are'),
    el('p', {class:'mb-7 max-w-3xl', style:'color:#3F4948; font-weight:300;'},
      `${DATA.metrics.merged} PRs merged, ${DATA.metrics.active} still in flight. The big arcs from S27:`),
    el('div', {class:'grid md:grid-cols-2 lg:grid-cols-4 gap-4'},
      arcCard('RESTOCK', 'Orders v2 lands', 'orders-v2 became the default route. Legacy /restock/orders ripped out, OrdersV2Enabled flag retired, BYOA recalc mutations + override+set bindings shipped.'),
      arcCard('PRODUCE', 'Material movement + mobile receive', 'MTR (Material Move + Receive Transfer) UI + E2E. MPR-05 mobile PO receive with OrganicLotCode + Vendor Lot # paths. HGI hardgoods inventory queries.'),
      arcCard('FULFILL', 'Orders, customers, allocation', 'CustomerItem v2 (shelf price + typed errors), deleteTerms with guards, allocation panel improvements, capacity row drilldown.'),
      arcCard('PLATFORM', 'Telemetry + KurrentDB hardening', 'OTel instrumentation across 6 produce projection handlers. KurrentDB read-stream disposal enforced via BannedApiAnalyzers. Serilog ReloadableLogger leak fixed.'),
    )
  );
}
function arcCard(product, title, desc){
  const c = PRODUCT_COLORS[product] || '#6B7280';
  return el('div', {class:'sf-card sf-card-hover p-5'},
    el('div', {class:'chip mb-3', style:`background:${c}`}, product),
    el('div', {class:'sf-h3 text-base'}, title),
    el('div', {class:'text-sm mt-2', style:'color:#3F4948; font-weight:300;'}, desc)
  );
}

function productsSection(){
  const products = Object.entries(DATA.products).sort((a,b) => b[1].count - a[1].count);
  return el('section', {id:'products', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'sf-eyebrow mb-2'}, 'The Slice'),
    el('h2', {class:'sf-h2 text-3xl mb-6'}, 'By product'),
    el('div', {class:'grid md:grid-cols-2 gap-5'},
      ...products.map(([name, p]) => productCard(name, p))
    )
  );
}
function productCard(name, p){
  const c = PRODUCT_COLORS[name] || '#6B7280';
  return el('div', {class:'sf-card sf-card-hover overflow-hidden'},
    el('div', {style:`background:${c}`, class:'px-5 py-3 text-white flex justify-between items-center'},
      el('div', {class:'sf-h3 text-lg', style:'color:white;'}, name),
      el('div', {class:'text-sm font-medium', style:'color:rgba(255,255,255,0.92);'},
        `${p.count} PRs · ${p.merged} merged · ${p.active} in red`)
    ),
    el('div', {class:'p-5'},
      el('div', {class:'sf-eyebrow mb-2'}, 'Top contributors'),
      el('div', {class:'flex flex-wrap gap-2 mb-5'},
        ...p.contributors.map(([n,cnt]) =>
          el('span', {class:'px-2.5 py-1 rounded text-sm', style:'background:#F2F2F2; color:#3F4948; font-weight:500;'},
            `${n} · ${cnt}`)
        )
      ),
      p.streams.length ? el('div', {},
        el('div', {class:'sf-eyebrow mb-2'}, 'Work streams'),
        el('div', {class:'flex flex-wrap gap-2 mb-5'},
          ...p.streams.map(([s,cnt]) =>
            el('span', {class:'px-2 py-1 rounded text-xs font-mono', style:'background:white; border:1px solid #B3B3B3; color:#3F4948;'},
              `${s} (${cnt})`)
          )
        )
      ) : null,
      el('div', {class:'sf-eyebrow mb-2'}, 'Sample titles'),
      el('ul', {class:'space-y-1 text-sm', style:'color:#3F4948; font-weight:300;'},
        ...p.sample_titles.map(t => el('li', {class:'truncate'}, `· ${t}`))
      )
    )
  );
}

function activeSection(){
  const gridContainer = el('div', {
    id: 'active-grid',
    class: 'ag-theme-quartz',
    style: 'height: 600px; width: 100%; --ag-font-family:Montserrat, Arial, sans-serif; --ag-font-size:13px; --ag-foreground-color:#3F4948; --ag-header-foreground-color:#3F4948; --ag-header-background-color:#F2F2F2; --ag-odd-row-background-color:#FAFAFA; --ag-row-hover-color:rgba(105,147,108,0.08); --ag-selected-row-background-color:rgba(161,219,166,0.20); --ag-border-color:#E5E7E5;'
  });

  setTimeout(() => mountActiveGrid(gridContainer), 0);

  return el('section', {id:'active', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'sf-eyebrow mb-2'}, 'In Flight'),
    el('h2', {class:'sf-h2 text-3xl mb-2'}, `In Red — ${DATA.active_prs.length} active PRs`),
    el('p', {class:'mb-5 max-w-3xl', style:'color:#3F4948; font-weight:300;'},
      'Open PRs at end of sprint — still being tested, reviewed, or in flight. These carry into Sprint 28 planning. Sort and filter via the column headers.'),
    el('div', {class:'sf-card overflow-hidden p-1'}, gridContainer)
  );
}

function mountActiveGrid(container){
  const productCellRenderer = (params) => {
    if (!params.value) return '';
    const c = PRODUCT_COLORS[params.value] || '#6B7280';
    return `<span class="chip" style="background:${c}">${params.value}</span>`;
  };
  const linkCellRenderer = (params) => {
    const pr = params.data;
    return `<a href="${pr.url}" target="_blank" style="color:#69936C; font-family:monospace; text-decoration:none;">#${pr.id} ↗</a>`;
  };
  const repoCellRenderer = (params) => {
    return `<span style="color:#69936C; font-family:monospace; font-size:12px;">${params.value}</span>`;
  };
  const dateCellRenderer = (params) => {
    return `<span style="color:#B3B3B3; font-family:monospace; font-size:12px;">${params.value || ''}</span>`;
  };

  const columnDefs = [
    { headerName: 'Author', field: 'author', width: 170, filter: 'agSetColumnFilter', floatingFilter: true,
      cellStyle: {color:'#3F4948', fontWeight:'500'} },
    { headerName: 'Opened', field: 'created_short', width: 110, sort: 'desc',
      cellRenderer: dateCellRenderer, filter: 'agDateColumnFilter', floatingFilter: true },
    { headerName: 'Product', field: 'product', width: 140, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: productCellRenderer },
    { headerName: 'Repo', field: 'repo', width: 180, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: repoCellRenderer },
    { headerName: 'Title', field: 'title', flex: 1, minWidth: 320, filter: 'agTextColumnFilter', floatingFilter: true,
      cellStyle: {color:'#3F4948'} },
    { headerName: 'Link', field: 'id', width: 100, cellRenderer: linkCellRenderer, sortable: false, filter: false },
  ];

  const gridOptions = {
    columnDefs: columnDefs,
    rowData: DATA.active_prs,
    defaultColDef: {
      sortable: true, resizable: true,
    },
    rowHeight: 36,
    headerHeight: 38,
    domLayout: 'normal',
    animateRows: true,
  };

  if (window.agGrid) {
    window.agGrid.createGrid(container, gridOptions);
  } else {
    container.textContent = 'AG Grid failed to load.';
  }
}

function allPrsSection(){
  // Flatten all PRs from authors (single source of truth)
  const allPrs = [];
  for (const a of DATA.authors) {
    for (const prs of Object.values(a.products)) {
      for (const pr of prs) allPrs.push(pr);
    }
  }

  const gridContainer = el('div', {
    id: 'all-prs-grid',
    class: 'ag-theme-quartz',
    style: 'height: 720px; width: 100%; --ag-font-family:Montserrat, Arial, sans-serif; --ag-font-size:13px; --ag-foreground-color:#3F4948; --ag-header-foreground-color:#3F4948; --ag-header-background-color:#F2F2F2; --ag-odd-row-background-color:#FAFAFA; --ag-row-hover-color:rgba(105,147,108,0.08); --ag-selected-row-background-color:rgba(161,219,166,0.20); --ag-border-color:#E5E7E5;'
  });

  setTimeout(() => mountAllPrsGrid(gridContainer, allPrs), 0);

  return el('section', {id:'all', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'sf-eyebrow mb-2'}, 'Every PR'),
    el('h2', {class:'sf-h2 text-3xl mb-2'}, `All PRs — ${allPrs.length} total`),
    el('p', {class:'mb-5 max-w-3xl', style:'color:#3F4948; font-weight:300;'},
      `Every PR from S27 in one filterable grid. Sort by merge date, filter by author or product, scan for outliers. ${allPrs.filter(p => p.status === 'merged').length} merged + ${allPrs.filter(p => p.status === 'active').length} active.`),
    el('div', {class:'sf-card overflow-hidden p-1'}, gridContainer)
  );
}

function mountAllPrsGrid(container, rows){
  const productCellRenderer = (params) => {
    if (!params.value) return '';
    const c = PRODUCT_COLORS[params.value] || '#6B7280';
    return `<span class="chip" style="background:${c}">${params.value}</span>`;
  };
  const statusCellRenderer = (params) => {
    if (params.value === 'active') {
      return `<span class="chip" style="background:#3F4948; color:white;">IN RED</span>`;
    }
    return `<span style="color:#69936C; font-weight:500;">merged</span>`;
  };
  const typeCellRenderer = (params) => {
    const styles = {
      feat: 'background:#A1DBA6; color:#2E3635;',
      fix:  'background:#F2F2F2; color:#3F4948;',
      misc: 'background:#F2F2F2; color:#B3B3B3;',
    };
    const s = styles[params.value] || styles.misc;
    return `<span style="${s} padding:1px 8px; border-radius:4px; font-family:monospace; font-size:11px; font-weight:600;">${params.value || ''}</span>`;
  };
  const linkCellRenderer = (params) => {
    const pr = params.data;
    return `<a href="${pr.url}" target="_blank" style="color:#69936C; font-family:monospace; font-size:12px; text-decoration:none;">#${pr.id} ↗</a>`;
  };
  const dateCellRenderer = (params) => {
    return `<span style="color:#69936C; font-family:monospace; font-size:12px;">${params.value || ''}</span>`;
  };
  const repoCellRenderer = (params) => {
    return `<span style="color:#69936C; font-family:monospace; font-size:12px;">${params.value}</span>`;
  };
  const scoreCellRenderer = (params) => {
    const s = params.value || 0;
    if (s >= 4) return `<span style="background:#A1DBA6; color:#2E3635; padding:1px 8px; border-radius:4px; font-family:monospace; font-weight:700; font-size:11px;">★ ${s}</span>`;
    if (s >= 2) return `<span style="color:#557A58; font-family:monospace; font-weight:600; font-size:12px;">★ ${s}</span>`;
    if (s <= -2) return `<span style="color:#B3B3B3; font-family:monospace; font-size:12px;">${s}</span>`;
    return `<span style="color:#B3B3B3; font-family:monospace; font-size:12px;">${s}</span>`;
  };

  const columnDefs = [
    { headerName: 'Status', field: 'status', width: 110, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: statusCellRenderer },
    { headerName: 'Merged', field: 'merged_short', width: 110, sort: 'desc',
      cellRenderer: dateCellRenderer, filter: 'agTextColumnFilter', floatingFilter: true },
    { headerName: 'Author', field: 'author', width: 170, filter: 'agSetColumnFilter', floatingFilter: true,
      cellStyle: {color:'#3F4948', fontWeight:'500'} },
    { headerName: 'Product', field: 'product', width: 140, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: productCellRenderer },
    { headerName: 'Type', field: 'type', width: 80, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: typeCellRenderer },
    { headerName: 'Repo', field: 'repo', width: 170, filter: 'agSetColumnFilter', floatingFilter: true,
      cellRenderer: repoCellRenderer },
    { headerName: 'Title', field: 'title', flex: 1, minWidth: 320, filter: 'agTextColumnFilter', floatingFilter: true,
      cellStyle: {color:'#3F4948'} },
    { headerName: 'Score', field: 'review_score', width: 80, filter: 'agNumberColumnFilter', floatingFilter: true,
      cellRenderer: scoreCellRenderer },
    { headerName: 'Link', field: 'id', width: 90, cellRenderer: linkCellRenderer, sortable: false, filter: false },
  ];

  const gridOptions = {
    columnDefs: columnDefs,
    rowData: rows,
    defaultColDef: { sortable: true, resizable: true },
    rowHeight: 36,
    headerHeight: 38,
    domLayout: 'normal',
    animateRows: true,
    pagination: true,
    paginationPageSize: 50,
    paginationPageSizeSelector: [25, 50, 100, 200],
  };

  if (window.agGrid) {
    window.agGrid.createGrid(container, gridOptions);
  } else {
    container.textContent = 'AG Grid failed to load.';
  }
}

function metricsSection(){
  const authorBars = DATA.authors.slice().sort((a,b) => b.pr_count - a.pr_count);
  const max = Math.max(...authorBars.map(a => a.pr_count));
  return el('section', {id:'metrics', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'sf-eyebrow mb-2'}, 'The Numbers'),
    el('h2', {class:'sf-h2 text-3xl mb-6'}, 'Sprint metrics'),
    el('div', {class:'grid md:grid-cols-2 gap-6'},
      el('div', {class:'sf-card p-6'},
        el('div', {class:'sf-h3 mb-4'}, 'PRs by author'),
        el('div', {class:'space-y-1.5'},
          ...authorBars.map(a => el('div', {class:'flex items-center gap-2 text-sm'},
            el('div', {class:'w-44 truncate', style:`color:${a.former ? '#B3B3B3' : '#3F4948'}; font-weight:500;`}, a.name),
            el('div', {class:'flex-1 rounded h-5 overflow-hidden', style:'background:#F2F2F2;'},
              el('div', {
                class:'h-full',
                style:`width:${(a.pr_count/max*100).toFixed(1)}%; background:${a.former ? '#B3B3B3' : '#69936C'};`
              })
            ),
            el('div', {class:'w-10 text-right font-mono text-xs', style:'color:#3F4948;'}, String(a.pr_count))
          ))
        )
      ),
      el('div', {class:'sf-card p-6'},
        el('div', {class:'sf-h3 mb-4'}, 'PRs by product'),
        el('div', {class:'space-y-2'},
          ...Object.entries(DATA.products).sort((a,b) => b[1].count - a[1].count).map(([name, p]) =>
            el('div', {class:'flex items-center gap-2 text-sm'},
              el('div', {class:'w-32'}, el('span', {class:'chip', style:`background:${PRODUCT_COLORS[name]}`}, name)),
              el('div', {class:'flex-1 rounded h-5 overflow-hidden', style:'background:#F2F2F2;'},
                el('div', {
                  class:'h-full',
                  style:`width:${(p.count/DATA.metrics.merged*100).toFixed(1)}%; background:${PRODUCT_COLORS[name]};`
                })
              ),
              el('div', {class:'w-10 text-right font-mono text-xs', style:'color:#3F4948;'}, String(p.count))
            )
          )
        )
      )
    )
  );
}

function reviewsSection(){
  return el('section', {id:'reviews', class:'max-w-7xl mx-auto px-6 py-10'},
    el('div', {class:'flex justify-between items-end mb-5'},
      el('div', {},
        el('div', {class:'sf-eyebrow mb-2'}, 'The Crew'),
        el('h2', {class:'sf-h2 text-3xl'}, 'By developer'),
        el('p', {class:'mt-2 max-w-3xl', style:'color:#3F4948; font-weight:300;'},
          'Every dev\'s PRs from S27 grouped by product area. Pick what you want to review — no assignments. Former Silver Fern devs appear at the end.'),
      ),
      el('div', {class:'text-sm', style:'color:#69936C; font-weight:500;'},
        `${DATA.authors.filter(a=>!a.former).length} active`)
    ),
    el('div', {class:'space-y-4'},
      ...DATA.authors.map(a => authorCard(a))
    )
  );
}

function authorCard(a){
  const productEntries = Object.entries(a.products).sort((x,y) => y[1].length - x[1].length);
  const cardStyle = a.former ? 'opacity:0.75;' : '';
  return el('div', {class:'sf-card', style:cardStyle},
    el('div', {class:'px-5 py-4 flex flex-wrap items-center gap-4 justify-between', style:'border-bottom:1px solid #F2F2F2;'},
      el('div', {},
        el('div', {class:'flex items-center gap-3 flex-wrap'},
          el('h3', {class:'sf-h3 text-xl'}, a.name),
          el('span', {class:'text-sm', style:'color:#B3B3B3;'}, `${a.pr_count} PRs`),
          a.former ? el('span', {class:'former-tag'}, 'Former') : null
        ),
        el('div', {class:'text-xs mt-1', style:'color:#B3B3B3;'}, a.email || '')
      ),
      el('div', {class:'flex flex-wrap gap-1.5'},
        ...productEntries.map(([prod, prs]) =>
          el('span', {class:'chip text-xs', style:`background:${PRODUCT_COLORS[prod]||'#6B7280'}`},
            `${prod} · ${prs.length}`)
        )
      )
    ),
    a.former
      ? el('div', {class:'px-5 py-3 text-xs italic', style:'background:#F2F2F2; color:#B3B3B3; font-family:"PT Serif", serif;'},
          'No longer at Silver Fern — listed for context.')
      : null,
    el('div', {class:'p-5'},
      ...productEntries.map(([prod, prs]) => productSection(prod, prs))
    )
  );
}

function productSection(prod, prs){
  const c = PRODUCT_COLORS[prod] || '#6B7280';
  return el('details', {class:'mb-3'},
    el('summary', {class:'flex items-center gap-2 py-2 px-2 rounded', style:'transition:background 0.15s;',
      onmouseover: (e) => e.currentTarget.style.background = '#F2F2F2',
      onmouseout:  (e) => e.currentTarget.style.background = 'transparent'},
      el('span', {class:'chev', style:'color:#B3B3B3;'}, '▸'),
      el('span', {class:'chip', style:`background:${c}`}, prod),
      el('span', {class:'text-sm', style:'color:#3F4948; font-weight:500;'},
        `${prs.length} PR${prs.length===1?'':'s'}`)
    ),
    el('div', {class:'pl-6 mt-2 space-y-1'},
      ...prs.map(pr => prRow(pr))
    )
  );
}

function prRow(pr){
  const typeStyles = {
    feat: {bg:'#A1DBA6', col:'#2E3635'},
    fix:  {bg:'#F2F2F2', col:'#3F4948'},
    misc: {bg:'#F2F2F2', col:'#B3B3B3'},
  };
  const ts = typeStyles[pr.type] || typeStyles.misc;
  const dateLabel = pr.status === 'merged' ? (pr.merged_short || '') : (pr.created_short || '');
  const dateColor = pr.status === 'merged' ? '#69936C' : '#B3B3B3';
  const dateTitle = pr.status === 'merged' ? `Merged ${pr.merged_short}` : `Opened ${pr.created_short}`;
  return el('div', {class:'pr-row flex items-start gap-3 px-2 py-1.5 rounded'},
    el('span', {class:'text-xs px-1.5 py-0.5 rounded font-mono shrink-0',
                style:`background:${ts.bg}; color:${ts.col}; font-weight:600;`}, pr.type),
    el('span', {class:'text-xs font-mono shrink-0 w-20',
                style:`color:${dateColor};`, title: dateTitle}, dateLabel),
    el('span', {class:'text-xs font-mono shrink-0 w-32 truncate', style:'color:#69936C;'}, pr.repo),
    el('a', {href:pr.url, target:'_blank', class:'text-sm hover:underline flex-1', style:'color:#3F4948;'},
      pr.title),
    pr.status === 'active'
      ? el('span', {class:'text-xs px-1.5 py-0.5 rounded shrink-0',
                    style:'background:#3F4948; color:white; font-weight:600; letter-spacing:0.05em;'}, 'IN RED')
      : null,
    el('span', {class:'text-xs font-mono shrink-0', style:'color:#B3B3B3;'}, `#${pr.id}`)
  );
}

function footer(){
  return el('footer', {class:'mt-12', style:'background:#3F4948; color:white;'},
    el('div', {class:'max-w-7xl mx-auto px-6 py-6 flex flex-wrap justify-between items-center gap-4'},
      el('div', {},
        el('div', {class:'sf-eyebrow', style:'color:#A1DBA6;'}, 'Silver Fern'),
        el('div', {class:'text-sm mt-1', style:'color:rgba(255,255,255,0.85);'},
          `Sprint Review · Generated ${new Date(DATA.generated_at).toLocaleString()}`)
      ),
      el('div', {class:'text-xs italic', style:'color:#A1DBA6; font-family:"PT Serif", serif;'},
        'Authentic · Innovative · Expert')
    )
  );
}

root.append(
  header(),
  overviewSection(),
  productsSection(),
  allPrsSection(),
  activeSection(),
  metricsSection(),
  reviewsSection(),
  footer(),
);
</script>
</body>
</html>
